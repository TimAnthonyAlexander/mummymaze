<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maze Escape — Mummy Sprite Generator</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        font: 13px/1.4 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        background: #201a12;
        color: #e8dcc2;
      }
      #app { display: grid; grid-template-columns: 320px 1fr; height: 100vh; }
      /* left control rail */
      #panel {
        overflow-y: auto;
        padding: 14px 16px;
        background: #17120c;
        border-right: 1px solid #3a2c18;
      }
      #panel h1 { font-size: 14px; margin: 0 0 4px; color: #e9c86b; letter-spacing: .5px; }
      #panel .sub { color: #9c8a63; margin: 0 0 14px; font-size: 11px; }
      .group { border-top: 1px solid #2e2415; padding: 10px 0; }
      .group > label.title { display: block; color: #c9a24e; font-size: 11px; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 8px; }
      .row { display: flex; align-items: center; gap: 8px; margin: 5px 0; }
      .row label { flex: 0 0 116px; color: #b7a680; font-size: 11px; }
      .row input[type="range"] { flex: 1; }
      .row .val { flex: 0 0 44px; text-align: right; color: #e9c86b; font-variant-numeric: tabular-nums; }
      button {
        font: inherit; cursor: pointer;
        background: #2c2113; color: #e8dcc2;
        border: 1px solid #4a3818; border-radius: 4px;
        padding: 6px 10px;
      }
      button:hover { background: #3a2c18; }
      button.active { background: #7a5a1e; border-color: #b48a2e; color: #fff4d6; }
      .btnrow { display: flex; flex-wrap: wrap; gap: 5px; }
      /* right stage */
      #stage { position: relative; display: grid; grid-template-rows: 1fr auto; min-width: 0; }
      #views { position: relative; display: flex; align-items: center; justify-content: center; gap: 24px; padding: 16px; overflow: hidden; }
      .viewbox { display: flex; flex-direction: column; align-items: center; gap: 6px; }
      .viewbox .cap { color: #9c8a63; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
      canvas.main { image-rendering: pixelated; background:
        repeating-conic-gradient(#2a2216 0% 25%, #241d12 0% 50%) 50% / 24px 24px; border: 1px solid #3a2c18; }
      canvas.debug { border: 1px solid #3a2c18; background: #14100a; }
      #sheetwrap { border-top: 1px solid #3a2c18; background: #14100a; padding: 10px 16px; max-height: 260px; overflow: auto; }
      #sheetwrap .cap { color: #9c8a63; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
      canvas.sheet { image-rendering: pixelated; background:
        repeating-conic-gradient(#2a2216 0% 25%, #241d12 0% 50%) 50% / 16px 16px; border: 1px solid #3a2c18; }
      .pill { display:inline-block; padding:2px 7px; border:1px solid #4a3818; border-radius: 999px; color:#c9a24e; font-size:10px; }
    </style>
  </head>
  <body>
    <div id="app">
      <aside id="panel"></aside>
      <main id="stage">
        <section id="views"></section>
        <section id="sheetwrap">
          <div class="cap">Baked sheet preview (<span id="sheetlabel">white</span>)</div>
          <canvas class="sheet" id="sheet"></canvas>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
